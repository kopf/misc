<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shepard Tone & Breathing Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        canvas {
            display: block;
        }

        #clickHint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            mix-blend-mode: difference;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1rem;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #clickHint {
                font-size: 4rem;
                letter-spacing: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="clickHint">CLICK</div>
    <canvas id="gridCanvas"></canvas>

    <script>
        // --- SHARED STATE & RANDOMIZATION ---
        const sharedSpeedFactor = Math.random(); // 0.0 to 1.0
        const direction = Math.random() > 0.5 ? 1 : -1;
        const startPhase = Math.random(); // Randomize where the Shepard Tone cycle starts

        // --- VISUAL ENGINE (BREATHING GRID) ---
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const clickHint = document.getElementById('clickHint');

        let squares = [];
        let squareSize = 50;
        let gap = 2;
        let hue = Math.floor(Math.random() * 360);
        
        // Map sharedSpeedFactor to visual speed range: 0.3 to 2.0
        const globalVisualSpeed = 0.3 + (sharedSpeedFactor * 1.7);

        class Square {
            constructor(x, y, size, saturation, lightness) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.saturation = saturation;
                this.lightness = lightness;
                this.phase = Math.random() * Math.PI * 2;
                this.baseFrequency = (0.005 + Math.random() * 0.02) * globalVisualSpeed;
                this.frequency = this.baseFrequency;
                this.frequencyTarget = this.baseFrequency;
                this.freqLerpSpeed = (0.0005 + Math.random() * 0.001) * globalVisualSpeed;
            }

            update() {
                if (Math.abs(this.frequency - this.frequencyTarget) < 0.0001) {
                    if (Math.random() < 0.01) {
                        this.frequencyTarget = (0.002 + Math.random() * 0.04) * globalVisualSpeed;
                    }
                } else {
                    this.frequency += (this.frequencyTarget - this.frequency) * this.freqLerpSpeed;
                }
                this.phase += this.frequency;
                if (this.phase > Math.PI * 2) this.phase -= Math.PI * 2;
            }

            draw() {
                const opacity = 0.5 + Math.sin(this.phase) * 0.4;
                ctx.fillStyle = `hsla(${hue}, ${this.saturation}%, ${this.lightness}%, ${opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            squares = [];
            const cols = Math.ceil(canvas.width / (squareSize + gap));
            const rows = Math.ceil(canvas.height / (squareSize + gap));
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * (squareSize + gap);
                    const y = j * (squareSize + gap);
                    const s = 40 + Math.random() * 40;
                    const l = 30 + Math.random() * 40;
                    squares.push(new Square(x, y, squareSize, s, l));
                }
            }
            // Initial draw (static)
            drawFrame();
        }

        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            squares.forEach(square => square.draw());
        }

        function animate() {
            if (!isPlaying) return;
            squares.forEach(square => square.update());
            drawFrame();
            updateAudio(); // Sync audio update with animation frame
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initGrid);


        // --- AUDIO ENGINE (SHEPARD TONE) ---
        const NUM_OSCILLATORS = 8;
        const MIN_FREQ = 27.5; // A0
        const MAX_FREQ = 4186; // C8
        const OCTAVES = Math.log2(MAX_FREQ / MIN_FREQ);

        let audioCtx = null;
        let oscillators = [];
        let gainNodes = [];
        let isPlaying = false;
        let startTime = 0;

        // Map sharedSpeedFactor to audio speed range: 0.005 to 0.020 oct/s
        const audioSpeed = 0.005 + (sharedSpeedFactor * 0.015);

        function createPianoWave(ctx) {
            const real = new Float32Array([0, 1, 0.4, 0.2, 0.1, 0.05, 0.02, 0.01]);
            const imag = new Float32Array(real.length).fill(0);
            return ctx.createPeriodicWave(real, imag);
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.2;
            masterGain.connect(audioCtx.destination);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 3000;
            filter.connect(masterGain);
            const pianoWave = createPianoWave(audioCtx);
            for (let i = 0; i < NUM_OSCILLATORS; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.setPeriodicWave(pianoWave);
                osc.connect(gain);
                gain.connect(filter);
                oscillators.push(osc);
                gainNodes.push(gain);
                osc.start();
            }
        }

        function updateAudio() {
            const elapsed = audioCtx.currentTime - startTime;
            const offset = (startPhase + elapsed * audioSpeed * direction) % 1;
            for (let i = 0; i < NUM_OSCILLATORS; i++) {
                let pos = (i / NUM_OSCILLATORS + offset) % 1;
                if (pos < 0) pos += 1;
                const freq = MIN_FREQ * Math.pow(2, pos * OCTAVES);
                oscillators[i].frequency.exponentialRampToValueAtTime(freq, audioCtx.currentTime + 0.1);
                const volume = Math.pow(Math.sin(pos * Math.PI), 2);
                gainNodes[i].gain.setTargetAtTime(volume, audioCtx.currentTime, 0.1);
            }
        }

        async function startEverything() {
            if (isPlaying) return;
            
            initAudio();
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            isPlaying = true;
            startTime = audioCtx.currentTime;
            
            // Hide the hint
            clickHint.style.display = 'none';
            
            // Start the loops
            animate();
        }

        // Single listener for everything
        window.addEventListener('click', startEverything);
        window.addEventListener('touchstart', startEverything);

        // Initial setup
        initGrid();
    </script>
</body>
</html>
